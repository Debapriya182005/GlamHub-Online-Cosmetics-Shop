{% include 'header.html' %}
{% load static %}

<div class="container my-5 py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 pt-4 text-center">
                    <h2 class="fw-bold text-glam-pink" style="color: #ff4d6d;">Welcome Back</h2>
                    <p class="text-muted">Login to your GlamHub account</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-4">
                            <label class="form-label fw-medium">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-glam btn-lg py-3">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted">Don't have an account? <a href="{% url 'regpage' %}" class="text-decoration-none fw-bold" style="color: #ff4d6d;">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'footer.html' %}
